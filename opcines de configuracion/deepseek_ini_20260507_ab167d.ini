[Unit]
Description=Sigegen Backend - Generator Monitoring
After=network.target mosquitto.service influxdb.service
Wants=mosquitto.service influxdb.service

[Service]
Type=simple
User=sigegen
Group=sigegen
WorkingDirectory=/opt/sigegen
Environment="PATH=/opt/sigegen/venv/bin"
ExecStart=/opt/sigegen/venv/bin/python /opt/sigegen/sigegen_backend.py
Restart=always
RestartSec=10
StandardOutput=journal
StandardError=journal

[Install]
WantedBy=multi-user.target